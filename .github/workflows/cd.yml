name: CD - Deploy to GitHub Pages

on:
  push:
    branches: ["main", "developement"] # Added developement branch
  workflow_dispatch: # Manual trigger option

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages-${{ github.ref_name }}" # Different group per branch
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy ${{ github.ref_name }} to GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "yarn"

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Set deployment path based on branch
        id: set-path
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "deploy_path=" >> $GITHUB_OUTPUT
            echo "public_url=/madarsa-farooqia" >> $GITHUB_OUTPUT
          else
            echo "deploy_path=development" >> $GITHUB_OUTPUT
            echo "public_url=/madarsa-farooqia/development" >> $GITHUB_OUTPUT
          fi

      - name: Build
        run: yarn build
        env:
          CI: false
          PUBLIC_URL: ${{ steps.set-path.outputs.public_url }}

      - name: Create 404.html for SPA routing
        run: cp build/index.html build/404.html

      - name: Add .nojekyll to bypass Jekyll
        run: touch build/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build
          name: pages-artifact-${{ github.ref_name }}

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          artifact_name: pages-artifact-${{ github.ref_name }}
