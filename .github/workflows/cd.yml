name: CD - Deploy to GitHub Pages

on:
  push:
    branches: ["developement"]
  workflow_dispatch:  # Manual trigger option

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # This job waits for CI to complete successfully
  wait-for-ci:
    name: Wait for CI to Complete
    runs-on: ubuntu-latest
    steps:
      - name: Wait for CI workflow
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const commitSha = context.sha;
            
            let attempts = 0;
            const maxAttempts = 30;
            
            while (attempts < maxAttempts) {
              const runs = await github.rest.actions.listWorkflowRuns({
                owner,
                repo,
                workflow_id: 'ci.yml',
                head_sha: commitSha,
                status: 'completed'
              });
              
              if (runs.data.workflow_runs.length > 0) {
                const ciRun = runs.data.workflow_runs[0];
                if (ciRun.conclusion === 'success') {
                  console.log('CI completed successfully!');
                  return;
                } else {
                  throw new Error(`CI failed with conclusion: ${ciRun.conclusion}`);
                }
              }
              
              await new Promise(resolve => setTimeout(resolve, 10000));
              attempts++;
            }
            throw new Error('Timeout waiting for CI to complete');

  deploy:
    name: Deploy to GitHub Pages
    needs: wait-for-ci
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build
        run: yarn build
        env:
          CI: false

      - name: Create 404.html for SPA routing
        run: cp build/index.html build/404.html

      - name: Add .nojekyll to bypass Jekyll
        run: touch build/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4