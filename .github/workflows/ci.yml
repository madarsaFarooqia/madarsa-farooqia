name: CI

on:
  push:
    branches: [ main, developement ]
  pull_request:
    branches: [ main, developement ]

jobs:
  validate-lock:
    name: Validate Lock File
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Check yarn.lock
        run: |
          if [ -f yarn.lock ]; then
            echo "yarn.lock found"
          else
            echo "yarn.lock missing" && exit 1
          fi

  install-deps:
    name: Install Dependencies
    runs-on: ubuntu-latest
    needs: validate-lock
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'yarn'
      - name: Install
        run: yarn install --frozen-lockfile

  env-validate:
    name: Environment Variable Validation
    runs-on: ubuntu-latest
    needs: install-deps
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Check .env.example
        run: |
          if [ -f .env.example ]; then echo ".env.example exists"; else echo ".env.example missing"; fi

  format-check:
    name: Code Formatting Check
    runs-on: ubuntu-latest
    needs: install-deps
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'yarn'
      - name: Install
        run: yarn install --frozen-lockfile
      - name: Prettier check
        run: |
          if yarn dlx prettier --version >/dev/null 2>&1; then
            yarn dlx prettier --check "**/*.{js,jsx,json,css,md}" || exit 1
          else
            echo "Prettier not available; skipping"
          fi

  lint:
    name: Lint Check
    runs-on: ubuntu-latest
    needs: install-deps
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'yarn'
      - name: Install
        run: yarn install --frozen-lockfile
      - name: Run ESLint
        run: |
          if yarn exec eslint --version >/dev/null 2>&1; then
            yarn exec eslint . --ext .js,.jsx || true
          else
            echo "ESLint not available; skipping"
          fi

  typecheck:
    name: TypeScript Type Check
    runs-on: ubuntu-latest
    needs: install-deps
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'yarn'
      - name: Install
        run: yarn install --frozen-lockfile
      - name: Run tsc
        run: |
          if [ -f tsconfig.json ]; then yarn tsc --noEmit; else echo "No tsconfig.json; skipping"; fi

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: install-deps
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'yarn'
      - name: Install
        run: yarn install --frozen-lockfile
      - name: Run tests
        env:
          CI: true
        run: yarn test --watchAll=false || (echo "Unit tests failed" && exit 1)

  build:
    name: Build Application
    runs-on: ubuntu-latest
    needs: [unit-tests, lint]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'yarn'
      - name: Install
        run: yarn install --frozen-lockfile
      - name: Build
        env:
          CI: false
        run: yarn build

  placeholder-advanced:
    name: Advanced / Optional Checks (placeholders)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Security scan
        run: echo "Security scan placeholder"
      - name: Docker build
        run: |
          if [ -f Dockerfile ]; then docker build -t madrasa-farooqia-ci .; else echo "No Dockerfile; skipping"; fi

